# Neko xf86-input-neko virtual touchscreen (append to xorg.conf when driver is installed).
# Matches Neko: https://github.com/m1k1o/neko/blob/master/runtime/xorg.conf
# Socket path must match BALIVERNE_NEKO_INPUT_SOCKET (default /tmp/xf86-input-neko.sock).

Section "InputDevice"
  Identifier "dummy_touchscreen"
  Option "SendCoreEvents" "On"
  Option "SocketName" "/tmp/xf86-input-neko.sock"
  Driver "neko"
EndSection
