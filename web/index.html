<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carabistouille &mdash; URL Analyzer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
</head>
<body>
  <header>
    <div class="header-left">
      <h1>Carabistouille</h1>
      <span class="subtitle">Malicious URL Analyzer</span>
    </div>
    <div class="header-right">
      <a href="/admin.html" class="header-link">Admin</a>
      <span id="agent-status" class="status disconnected">
        <span class="status-dot"></span>
        <span class="status-text">Agent disconnected</span>
      </span>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <section class="submit-section">
        <h2>Analyze URL</h2>
        <form id="url-form">
          <input type="url" id="url-input" placeholder="https://suspicious-site.example" required>
          <div class="proxy-row">
            <input type="text" id="proxy-input" placeholder="Proxy (e.g. socks5://host:port)">
            <button type="button" id="proxy-toggle" class="proxy-toggle" title="Toggle proxy settings">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </button>
          </div>
          <button type="submit" id="submit-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
            </svg>
            Analyze
          </button>
        </form>
      </section>
      <section class="analyses-section">
        <h2>History</h2>
        <div id="analyses-list"></div>
      </section>
    </aside>

    <section class="viewer-section">
      <div class="viewer-toolbar">
        <div class="tool-group">
          <button class="tool-btn active" data-tool="interact" title="Interact with the page">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
          </button>
          <button class="tool-btn" data-tool="inspect" title="Inspect elements">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          </button>
        </div>
        <div class="page-info">
          <span id="page-url" class="page-url"></span>
        </div>
        <button id="stop-btn" class="stop-btn" style="display:none" title="Finish analysis and generate report">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
          Finish
        </button>
      </div>

      <div class="viewport-wrapper" id="viewport-wrapper">
        <div class="viewport-placeholder" id="viewport-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/>
          </svg>
          <p>Submit a URL to begin analysis</p>
        </div>
        <img id="viewport-img" class="viewport-img" style="display:none" alt="Browser viewport">
        <div id="inspect-highlight" class="inspect-highlight"></div>
      </div>

      <div id="element-inspector" class="element-inspector" style="display:none">
        <div id="inspector-content" class="inspector-content"></div>
      </div>
    </section>

    <div id="report-resizer" class="panel-resizer"></div>
    <aside class="report-panel" id="report-panel">
      <div class="report-header">
        <h2>Report</h2>
        <div id="risk-badge" class="risk-badge" style="display:none">
          <span id="risk-score" class="risk-score">0</span>
        </div>
      </div>
      <div class="report-tabs">
        <button class="tab active" data-tab="network">Network <span id="count-network" class="tab-count">0</span></button>
        <button class="tab" data-tab="scripts">Scripts <span id="count-scripts" class="tab-count">0</span></button>
        <button class="tab" data-tab="console">Console <span id="count-console" class="tab-count">0</span></button>
        <button class="tab" data-tab="raw">Raw <span id="count-raw" class="tab-count">0</span></button>
        <button class="tab" data-tab="screenshots">Screenshots <span id="count-screenshots" class="tab-count">0</span></button>
        <button class="tab" data-tab="security">Security</button>
      </div>
      <div class="tab-panels">
        <div class="tab-panel active" id="panel-network">
          <div class="panel-search"><input type="text" id="search-network" class="search-input" placeholder="Filter requests..."></div>
          <div id="panel-network-list" class="panel-list"><div class="panel-empty">No network data yet</div></div>
        </div>
        <div class="tab-panel" id="panel-scripts">
          <div class="panel-search"><input type="text" id="search-scripts" class="search-input" placeholder="Filter scripts..."></div>
          <div id="panel-scripts-list" class="panel-list"><div class="panel-empty">No scripts detected</div></div>
        </div>
        <div class="tab-panel" id="panel-console">
          <div class="panel-search"><input type="text" id="search-console" class="search-input" placeholder="Filter logs..."></div>
          <div id="panel-console-list" class="panel-list"><div class="panel-empty">No console output</div></div>
        </div>
        <div class="tab-panel" id="panel-raw">
          <div class="panel-search"><input type="text" id="search-raw" class="search-input" placeholder="Filter files..."></div>
          <div id="panel-raw-list" class="panel-list"><div class="panel-empty">No files captured yet</div></div>
        </div>
        <div class="tab-panel" id="panel-screenshots">
          <div id="panel-screenshots-list" class="panel-list"><div class="panel-empty">No screenshots captured yet</div></div>
        </div>
        <div class="tab-panel" id="panel-security">
          <div class="panel-empty">No security analysis yet</div>
        </div>
      </div>
    </aside>
  </main>

  <script src="app.js"></script>
</body>
</html>
